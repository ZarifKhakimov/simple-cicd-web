<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD Chat Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 24px;
      overflow: hidden;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 900px;
      width: 100%;
    }

    .bubble {
      display: inline-block;
      width: fit-content;
      max-width: 90%;
      padding: 22px 34px;
      border-radius: 999px;
      background: linear-gradient(90deg, #171717, #1f1f1f);
      color: white;
      font-size: 28px;
      line-height: 1.3;
      opacity: 0;
      transform: translateY(25px) scale(0.96);
      filter: blur(6px);
      transition: opacity 0.7s ease, transform 0.7s ease, filter 0.7s ease;
      white-space: nowrap;
    }

    .bubble.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .typing-text {
      border-right: 3px solid rgba(255,255,255,0.8);
      padding-right: 4px;
      white-space: nowrap;
    }

    .link {
      color: #1e7bff;
      text-decoration: underline;
    }

    .dots {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 28px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6f6f6f;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.5;
      }
      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .bubble {
        font-size: 20px;
        padding: 18px 24px;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container" id="chat"></div>

  <script>
    const chat = document.getElementById("chat");

    const messages = [
      "Hey there 👋",
      "I'm Samandar",
      "This website demonstrates Continuous Deployment",
      "When I update the code, users can see changes live"
    ];

    function createBubble() {
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const span = document.createElement("span");
      span.className = "typing-text";
      bubble.appendChild(span);
      chat.appendChild(bubble);
      return { bubble, span };
    }

    function typeText(element, text, speed = 45) {
      return new Promise((resolve) => {
        let i = 0;
        function type() {
          if (i < text.length) {
            element.innerHTML = text.substring(0, i + 1);
            i++;
            setTimeout(type, speed);
          } else {
            element.style.borderRight = "none";
            resolve();
          }
        }
        type();
      });
    }

    function createDotsBubble() {
      const bubble = document.createElement("div");
      bubble.className = "bubble dots";
      bubble.innerHTML = `
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      `;
      chat.appendChild(bubble);
      setTimeout(() => bubble.classList.add("show"), 50);
      return bubble;
    }

    async function showSequence() {
      for (let msg of messages) {
        const dots = createDotsBubble();
        await new Promise((r) => setTimeout(r, 900));
        dots.remove();

        const { bubble, span } = createBubble();
        setTimeout(() => bubble.classList.add("show"), 50);

        await new Promise((r) => setTimeout(r, 500));
        await typeText(span, msg);
        await new Promise((r) => setTimeout(r, 450));
      }
    }

    showSequence();
  </script>
</body>
</html>
