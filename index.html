<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD Live Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #4facfe, #00f2fe, #a18cd1, #fbc2eb);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite;
    }

    .blob1 {
      width: 220px;
      height: 220px;
      background: #ff6ec7;
      top: 10%;
      left: 10%;
    }

    .blob2 {
      width: 260px;
      height: 260px;
      background: #7afcff;
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    .blob3 {
      width: 180px;
      height: 180px;
      background: #fff176;
      top: 60%;
      left: 20%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-20px) translateX(20px); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 700px;
      padding: 40px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .version {
      margin-top: 20px;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 12px 20px;
      display: inline-block;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
    }

    button {
      margin-top: 25px;
      padding: 12px 24px;
      border: none;
      border-radius: 14px;
      background: white;
      color: #5b4bff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.06);
    }

    .message {
      margin-top: 20px;
      font-size: 1rem;
      color: #fff;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="card">
    <h1>CI/CD Live Website Demo</h1>
    <p>This website demonstrates Continuous Deployment.</p>
    <p>Whenever I update the code and commit changes, users can see the new version online.</p>

    <div class="version">Version 1.0</div>

    <br />
    <button onclick="showMessage()">Click Me</button>
    <div class="message" id="msg"></div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").innerText =
        "This is an interactive website! Update the code to show a new version.";
    }
  </script>
</body>
</html>
